version: 2
updates:
  # Keep GitHub Actions versions fresh.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Keep Python dependencies (managed via uv/pyproject.toml + uv.lock) fresh,
  # including proposing future fastmcp majors instead of requiring a manual trigger.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
